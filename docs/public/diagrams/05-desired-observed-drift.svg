<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" role="img" aria-labelledby="title desc">
  <title id="title">Desired versus observed drift</title>
  <desc id="desc">Desired state and observed state compared to produce a drift report.</desc>
  
    <style><![CDATA[
      .label { font-family: Helvetica, Arial, sans-serif; fill: #202327; font-size: 18px; font-weight: 600; }
      .small { font-family: Helvetica, Arial, sans-serif; fill: #646973; font-size: 13px; font-weight: 400; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #202327; font-size: 15px; }
      .tiny { font-family: Helvetica, Arial, sans-serif; fill: #646973; font-size: 11px; }
      .box { fill: #f3f1ec; stroke: #e4e1da; stroke-width: 1.5; }
      .box-ink { fill: #f3f1ec; stroke: #202327; stroke-width: 1.5; }
      .planned { stroke: #5a5f67; stroke-dasharray: 8 6; }
      .arrow { stroke: #202327; stroke-width: 1.7; fill: none; marker-end: url(#arrowInk); }
      .arrowAccent { stroke: #1f3a5f; stroke-width: 2; fill: none; marker-end: url(#arrowAccent); }
      .hair { stroke: #e4e1da; stroke-width: 1.5; }
    ]]></style>
    
  <defs>
    <marker id="arrowInk" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#202327"/>
    </marker>
    <marker id="arrowAccent" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f3a5f"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="720" height="420" fill="#faf9f6"/>
<rect x="50" y="95" width="190" height="130" rx="8" class="box-ink" />
<text x="145" y="125" class="label" text-anchor="middle" dominant-baseline="middle">Desired state</text>
<text x="145" y="153" class="small" text-anchor="middle" dominant-baseline="middle">hostwright.yaml</text>
<text x="76" y="180" class="tiny" text-anchor="start">
  <tspan x="76" dy="0">api image:v2</tspan>
  <tspan x="76" dy="18">redis running</tspan>
  <tspan x="76" dy="18">worker declared</tspan>
</text>
<rect x="480" y="95" width="190" height="130" rx="8" class="box-ink planned" />
<text x="575" y="125" class="label" text-anchor="middle" dominant-baseline="middle">Observed runtime</text>
<text x="575" y="153" class="small" text-anchor="middle" dominant-baseline="middle">Apple container</text>
<text x="506" y="180" class="tiny" text-anchor="start">
  <tspan x="506" dy="0">api image:v1</tspan>
  <tspan x="506" dy="18">redis running</tspan>
  <tspan x="506" dy="18">worker missing</tspan>
</text>
<rect x="295" y="125" width="130" height="70" rx="8" class="box-ink planned" />
<text x="360" y="160" class="label" text-anchor="middle" dominant-baseline="middle">Comparator</text>
<path d="M 240 160 L 295 160" class="arrow"/>
<path d="M 480 160 L 425 160" class="arrow"/>
<path d="M 360 195 L 360 270" class="arrowAccent"/>
<rect x="210" y="270" width="300" height="100" rx="8" class="box-ink planned" />
<text x="360" y="295" class="label" text-anchor="middle" dominant-baseline="middle">Drift report</text>
<text x="245" y="325" class="small" text-anchor="start">
  <tspan x="245" dy="0">✓ redis: running</tspan>
  <tspan x="245" dy="18">✕ api: image mismatch</tspan>
  <tspan x="245" dy="18">✕ worker: missing</tspan>
</text>
<text x="360" y="400" class="small" text-anchor="middle" fill="#5a5f67">Planned — requires runtime observation.</text>
</svg>
