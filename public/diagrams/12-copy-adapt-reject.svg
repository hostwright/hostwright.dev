<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" role="img" aria-labelledby="title desc">
  <title id="title">Copy adapt reject framing</title>
  <desc id="desc">Copy, adapt, reject framing for which container-tooling ideas Hostwright keeps, reshapes, or refuses.</desc>
  
    <style><![CDATA[
      .label { font-family: Helvetica, Arial, sans-serif; fill: #202327; font-size: 18px; font-weight: 600; }
      .small { font-family: Helvetica, Arial, sans-serif; fill: #646973; font-size: 13px; font-weight: 400; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #202327; font-size: 15px; }
      .tiny { font-family: Helvetica, Arial, sans-serif; fill: #646973; font-size: 11px; }
      .box { fill: #f3f1ec; stroke: #e4e1da; stroke-width: 1.5; }
      .box-ink { fill: #f3f1ec; stroke: #202327; stroke-width: 1.5; }
      .planned { stroke: #5a5f67; stroke-dasharray: 8 6; }
      .arrow { stroke: #202327; stroke-width: 1.7; fill: none; marker-end: url(#arrowInk); }
      .arrowAccent { stroke: #1f3a5f; stroke-width: 2; fill: none; marker-end: url(#arrowAccent); }
      .hair { stroke: #e4e1da; stroke-width: 1.5; }
    ]]></style>
    
  <defs>
    <marker id="arrowInk" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#202327"/>
    </marker>
    <marker id="arrowAccent" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f3a5f"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="720" height="420" fill="#faf9f6"/>
<rect x="60" y="80" width="180" height="250" rx="8" class="box-ink" />
<text x="150" y="115" class="label" text-anchor="middle" dominant-baseline="middle">Copy</text>
<text x="95" y="160" class="small" text-anchor="start">
  <tspan x="95" dy="0">• desired-state</tspan>
  <tspan x="95" dy="18">• plan/apply</tspan>
  <tspan x="95" dy="18">• health checks</tspan>
</text>
<rect x="280" y="80" width="180" height="250" rx="8" class="box-ink" />
<text x="370" y="115" class="label" text-anchor="middle" dominant-baseline="middle">Adapt</text>
<text x="315" y="160" class="small" text-anchor="start">
  <tspan x="315" dy="0">• manifest schema</tspan>
  <tspan x="315" dy="18">• reconciliation loop</tspan>
  <tspan x="315" dy="18">• single-host policy</tspan>
</text>
<rect x="500" y="80" width="180" height="250" rx="8" class="box-ink" />
<text x="590" y="115" class="label" text-anchor="middle" dominant-baseline="middle">Reject</text>
<text x="535" y="160" class="small" text-anchor="start">
  <tspan x="535" dy="0">• CRI shim</tspan>
  <tspan x="535" dy="18">• Docker API emulation</tspan>
  <tspan x="535" dy="18">• cluster scheduling</tspan>
</text>
<path d="M 525 135 L 655 135" class="hair"/>
</svg>
