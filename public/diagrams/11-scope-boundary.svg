<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 440" role="img" aria-labelledby="title desc">
  <title id="title">In-scope out-of-scope boundary</title>
  <desc id="desc">A scope boundary: single-host control inside, cluster/cloud/Docker-API features outside.</desc>
  
    <style><![CDATA[
      .label { font-family: Helvetica, Arial, sans-serif; fill: #202327; font-size: 18px; font-weight: 600; }
      .small { font-family: Helvetica, Arial, sans-serif; fill: #646973; font-size: 13px; font-weight: 400; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #202327; font-size: 15px; }
      .tiny { font-family: Helvetica, Arial, sans-serif; fill: #646973; font-size: 11px; }
      .box { fill: #f3f1ec; stroke: #e4e1da; stroke-width: 1.5; }
      .box-ink { fill: #f3f1ec; stroke: #202327; stroke-width: 1.5; }
      .planned { stroke: #5a5f67; stroke-dasharray: 8 6; }
      .arrow { stroke: #202327; stroke-width: 1.7; fill: none; marker-end: url(#arrowInk); }
      .arrowAccent { stroke: #1f3a5f; stroke-width: 2; fill: none; marker-end: url(#arrowAccent); }
      .hair { stroke: #e4e1da; stroke-width: 1.5; }
    ]]></style>
    
  <defs>
    <marker id="arrowInk" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#202327"/>
    </marker>
    <marker id="arrowAccent" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f3a5f"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="720" height="440" fill="#faf9f6"/>
<rect x="90" y="95" width="540" height="210" rx="20" class="box-ink" />
<text x="360" y="125" class="label" text-anchor="middle" dominant-baseline="middle">In scope</text>
<rect x="135" y="165" width="130" height="42" rx="8" class="box" />
<text x="200" y="186" class="small" text-anchor="middle" dominant-baseline="middle">single-host</text>
<rect x="300" y="165" width="130" height="42" rx="8" class="box" />
<text x="365" y="186" class="small" text-anchor="middle" dominant-baseline="middle">declared state</text>
<rect x="465" y="165" width="130" height="42" rx="8" class="box" />
<text x="530" y="186" class="small" text-anchor="middle" dominant-baseline="middle">planning</text>
<rect x="135" y="235" width="130" height="42" rx="8" class="box" />
<text x="200" y="256" class="small" text-anchor="middle" dominant-baseline="middle">drift</text>
<rect x="300" y="235" width="130" height="42" rx="8" class="box" />
<text x="365" y="256" class="small" text-anchor="middle" dominant-baseline="middle">doctor</text>
<rect x="465" y="235" width="130" height="42" rx="8" class="box" />
<text x="530" y="256" class="small" text-anchor="middle" dominant-baseline="middle">safe cleanup</text>
<rect x="70" y="55" width="150" height="34" rx="8" class="box planned" />
<text x="145" y="72" class="tiny" text-anchor="middle" dominant-baseline="middle">multi-host/cluster</text>
<rect x="500" y="55" width="150" height="34" rx="8" class="box planned" />
<text x="575" y="72" class="tiny" text-anchor="middle" dominant-baseline="middle">Kubernetes/CRI</text>
<rect x="40" y="340" width="150" height="34" rx="8" class="box planned" />
<text x="115" y="357" class="tiny" text-anchor="middle" dominant-baseline="middle">full Compose parity</text>
<rect x="505" y="340" width="150" height="34" rx="8" class="box planned" />
<text x="580" y="357" class="tiny" text-anchor="middle" dominant-baseline="middle">Docker API shim</text>
<rect x="255" y="350" width="150" height="34" rx="8" class="box planned" />
<text x="330" y="367" class="tiny" text-anchor="middle" dominant-baseline="middle">cloud control plane</text>
<rect x="70" y="285" width="150" height="34" rx="8" class="box planned" />
<text x="145" y="302" class="tiny" text-anchor="middle" dominant-baseline="middle">tunnels</text>
<rect x="560" y="285" width="150" height="34" rx="8" class="box planned" />
<text x="635" y="302" class="tiny" text-anchor="middle" dominant-baseline="middle">GPU scheduling</text>
<rect x="250" y="55" width="150" height="34" rx="8" class="box planned" />
<text x="325" y="72" class="tiny" text-anchor="middle" dominant-baseline="middle">production-readiness</text>
<text x="360" y="325" class="small" text-anchor="middle">Out of scope labels are dashed and outside the boundary.</text>
</svg>
