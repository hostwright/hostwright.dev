<svg xmlns="http://www.w3.org/2000/svg" width="720" height="460" viewBox="0 0 720 460" role="img" aria-labelledby="title desc">
  <title id="title">Hostwright scope boundary</title>
  <desc id="desc">A balanced scope diagram with four out-of-scope items above, four below, and the in-scope Hostwright boundary centered.</desc>

  <defs>
    <style>
      .bg { fill: #faf9f6; }
      .card { fill: #faf9f6; stroke: #e4e1da; stroke-width: 1.5; }
      .boundary { fill: #faf9f6; stroke: #202327; stroke-width: 1.9; }
      .box { fill: #faf9f6; stroke: #e4e1da; stroke-width: 1.5; }
      .planned { fill: #faf9f6; stroke: #5a5f67; stroke-width: 1.8; stroke-dasharray: 7 7; }
      .text { fill: #202327; font-family: Arial, Helvetica, sans-serif; }
      .muted { fill: #646973; font-family: Arial, Helvetica, sans-serif; }
      .plannedText { fill: #5a5f67; font-family: Arial, Helvetica, sans-serif; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="720" height="460"/>
  <rect class="card" x="24" y="24" width="672" height="412" rx="16"/>

  <!-- Top out-of-scope row: 4 items -->
  <rect class="planned" x="58" y="54" width="142" height="36" rx="7"/>
  <rect class="planned" x="216" y="54" width="154" height="36" rx="7"/>
  <rect class="planned" x="386" y="54" width="142" height="36" rx="7"/>
  <rect class="planned" x="544" y="54" width="118" height="36" rx="7"/>

  <text class="plannedText" x="129" y="76" text-anchor="middle" font-size="12.5" font-weight="500">multi-host / cluster</text>
  <text class="plannedText" x="293" y="76" text-anchor="middle" font-size="12.5" font-weight="500">production readiness</text>
  <text class="plannedText" x="457" y="76" text-anchor="middle" font-size="12.5" font-weight="500">Kubernetes / CRI</text>
  <text class="plannedText" x="603" y="76" text-anchor="middle" font-size="12.5" font-weight="500">GPU scheduling</text>

  <!-- Main in-scope boundary -->
  <rect class="boundary" x="118" y="112" width="484" height="204" rx="18"/>
  <text class="text" x="360" y="150" text-anchor="middle" font-size="20" font-weight="700">In scope</text>

  <!-- In-scope row 1 -->
  <rect class="box" x="154" y="176" width="120" height="42" rx="8"/>
  <rect class="box" x="300" y="176" width="120" height="42" rx="8"/>
  <rect class="box" x="446" y="176" width="120" height="42" rx="8"/>

  <text class="muted" x="214" y="202" text-anchor="middle" font-size="13" font-weight="500">single-host</text>
  <text class="muted" x="360" y="202" text-anchor="middle" font-size="13" font-weight="500">declared state</text>
  <text class="muted" x="506" y="202" text-anchor="middle" font-size="13" font-weight="500">planning</text>

  <!-- In-scope row 2 -->
  <rect class="box" x="154" y="244" width="120" height="42" rx="8"/>
  <rect class="box" x="300" y="244" width="120" height="42" rx="8"/>
  <rect class="box" x="446" y="244" width="120" height="42" rx="8"/>

  <text class="muted" x="214" y="270" text-anchor="middle" font-size="13" font-weight="500">drift</text>
  <text class="muted" x="360" y="270" text-anchor="middle" font-size="13" font-weight="500">doctor</text>
  <text class="muted" x="506" y="270" text-anchor="middle" font-size="13" font-weight="500">safe cleanup</text>

  <!-- Bottom out-of-scope row: 4 items -->
  <rect class="planned" x="46" y="340" width="144" height="36" rx="7"/>
  <rect class="planned" x="206" y="340" width="144" height="36" rx="7"/>
  <rect class="planned" x="366" y="340" width="144" height="36" rx="7"/>
  <rect class="planned" x="530" y="340" width="132" height="36" rx="7"/>

  <text class="plannedText" x="118" y="362" text-anchor="middle" font-size="12.5" font-weight="500">full Compose parity</text>
  <text class="plannedText" x="278" y="362" text-anchor="middle" font-size="12.5" font-weight="500">cloud control plane</text>
  <text class="plannedText" x="438" y="362" text-anchor="middle" font-size="12.5" font-weight="500">Docker API shim</text>
  <text class="plannedText" x="596" y="362" text-anchor="middle" font-size="12.5" font-weight="500">tunnels</text>

  <!-- Caption -->
  <text class="muted" x="360" y="410" text-anchor="middle" font-size="14" font-weight="500">
    Inside the boundary is in scope. Dashed labels above and below the boundary are not.
  </text>
</svg>
