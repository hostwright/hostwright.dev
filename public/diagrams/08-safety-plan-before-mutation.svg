<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 460" role="img" aria-labelledby="title desc">
  <title id="title">Safety plan before mutation</title>
  <desc id="desc">Safety flow: validate, plan, confirm destructive actions, then apply; dry-run exits before any mutation.</desc>
  
    <style><![CDATA[
      .label { font-family: Helvetica, Arial, sans-serif; fill: #202327; font-size: 18px; font-weight: 600; }
      .small { font-family: Helvetica, Arial, sans-serif; fill: #646973; font-size: 13px; font-weight: 400; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #202327; font-size: 15px; }
      .tiny { font-family: Helvetica, Arial, sans-serif; fill: #646973; font-size: 11px; }
      .box { fill: #f3f1ec; stroke: #e4e1da; stroke-width: 1.5; }
      .box-ink { fill: #f3f1ec; stroke: #202327; stroke-width: 1.5; }
      .planned { stroke: #5a5f67; stroke-dasharray: 8 6; }
      .arrow { stroke: #202327; stroke-width: 1.7; fill: none; marker-end: url(#arrowInk); }
      .arrowAccent { stroke: #1f3a5f; stroke-width: 2; fill: none; marker-end: url(#arrowAccent); }
      .hair { stroke: #e4e1da; stroke-width: 1.5; }
    ]]></style>
    
  <defs>
    <marker id="arrowInk" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#202327"/>
    </marker>
    <marker id="arrowAccent" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f3a5f"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="720" height="460" fill="#faf9f6"/>
<rect x="55" y="90" width="110" height="60" rx="8" class="box-ink" />
<text x="110.0" y="120.0" class="label" text-anchor="middle" dominant-baseline="middle">Command</text>
<rect x="200" y="90" width="130" height="60" rx="8" class="box-ink" />
<text x="265.0" y="114" class="label" text-anchor="middle">
  <tspan x="265.0" dy="0">Validate</tspan>
  <tspan x="265.0" dy="20">manifest</tspan>
</text>
<rect x="370" y="90" width="120" height="60" rx="8" class="box-ink" />
<text x="430.0" y="114" class="label" text-anchor="middle">
  <tspan x="430.0" dy="0">Compute</tspan>
  <tspan x="430.0" dy="20">plan</tspan>
</text>
<path d="M 165 120 L 200 120" class="arrow"/>
<path d="M 330 120 L 370 120" class="arrow"/>
<path d="M 575 85 L 640 120 L 575 155 L 510 120 Z" fill="#f3f1ec" stroke="#202327" stroke-width="1.5"/>
<text x="575" y="114" class="small" text-anchor="middle" dominant-baseline="middle">Destructive?</text>
<path d="M 490 120 L 510 120" class="arrow"/>
<rect x="450" y="240" width="180" height="62" rx="8" class="box-ink" />
<text x="540" y="270" class="small" text-anchor="middle" dominant-baseline="middle">Explicit confirmation</text>
<rect x="270" y="240" width="130" height="62" rx="8" class="box-ink planned" />
<text x="335" y="265" class="label" text-anchor="middle" dominant-baseline="middle">Apply</text>
<text x="335" y="288" class="tiny" text-anchor="middle" dominant-baseline="middle" fill="#5a5f67">Planned</text>
<path d="M 575 155 L 540 240" class="arrow"/>
<path d="M 450 270 L 400 270" class="arrow" stroke-dasharray="8 6"/>
<path d="M 430 150 L 430 185 L 170 185 L 170 270" class="arrow" stroke-dasharray="8 6"/>
<rect x="80" y="240" width="180" height="62" rx="8" class="box planned" />
<text x="170" y="263" class="label" text-anchor="middle" dominant-baseline="middle">--dry-run</text>
<text x="170" y="286" class="small" text-anchor="middle" dominant-baseline="middle">print plan, exit</text>
<text x="360" y="405" class="small" text-anchor="middle">Nothing mutates before the plan is shown.</text>
</svg>
