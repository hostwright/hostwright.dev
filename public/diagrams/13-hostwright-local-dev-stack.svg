<svg xmlns="http://www.w3.org/2000/svg" width="720" height="460" viewBox="0 0 720 460" role="img" aria-labelledby="title desc">
  <title id="title">Where Hostwright sits</title>
  <desc id="desc">Hostwright sits as a thin control layer between your services and Apple&#x27;s container runtime on macOS on Apple silicon.</desc>
  <defs>
    <style>
      .bg { fill: #faf9f6; }
      .card { fill: #faf9f6; stroke: #e4e1da; stroke-width: 1.5; }
      .box { fill: #f3f1ec; stroke: #202327; stroke-width: 1.8; }
      .box-light { fill: #faf9f6; stroke: #e4e1da; stroke-width: 1.5; }
      .box-planned { fill: #faf9f6; stroke: #5a5f67; stroke-width: 1.8; stroke-dasharray: 8 7; }
      .accent { fill: #1f3a5f; stroke: #1f3a5f; }
      .text { fill: #202327; font-family: Arial, Helvetica, sans-serif; }
      .muted { fill: #646973; font-family: Arial, Helvetica, sans-serif; }
      .white { fill: #ffffff; font-family: Arial, Helvetica, sans-serif; }
      .mono { fill: #202327; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
      .line { stroke: #202327; stroke-width: 1.8; fill: none; }
      .line-muted { stroke: #e4e1da; stroke-width: 1.2; fill: none; }
      .line-planned { stroke: #5a5f67; stroke-width: 1.8; fill: none; stroke-dasharray: 8 7; }
      .arrow { stroke: #202327; stroke-width: 1.8; fill: none; marker-end: url(#arrow); }
      .arrow-accent { stroke: #1f3a5f; stroke-width: 2.2; fill: none; marker-end: url(#arrowAccent); }
      .arrow-planned { stroke: #5a5f67; stroke-width: 1.8; fill: none; stroke-dasharray: 8 7; marker-end: url(#arrowPlanned); }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#202327"/>
    </marker>
    <marker id="arrowAccent" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f3a5f"/>
    </marker>
    <marker id="arrowPlanned" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5a5f67"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="720" height="460"/>

  <rect class="card" x="24" y="28" width="672" height="384" rx="14"/>
  <rect class="box-light" x="116" y="86" width="488" height="58" rx="8"/>
  <text class="text" x="360" y="122" text-anchor="middle" font-size="18" font-weight="700">Your services / code</text>
  <path class="arrow" d="M360 144 V166"/>
  <rect x="116" y="170" width="488" height="68" rx="8" fill="#1f3a5f" stroke="#1f3a5f" stroke-width="1.8"/>
  <text class="white" x="360" y="209" text-anchor="middle" font-size="19" font-weight="700">Hostwright</text>
  <text class="white" x="360" y="232" text-anchor="middle" font-size="13" font-weight="700">(declared state + control)</text>
  <path class="arrow-accent" d="M360 238 V260"/>
  <rect class="box-light" x="116" y="264" width="488" height="58" rx="8"/>
  <text class="text" x="360" y="300" text-anchor="middle" font-size="18" font-weight="700">Apple container runtime</text>
  <path class="arrow" d="M360 322 V344"/>
  <rect class="box-light" x="116" y="348" width="488" height="58" rx="8"/>
  <text class="text" x="360" y="384" text-anchor="middle" font-size="18" font-weight="700">macOS on Apple silicon</text>
  <text class="muted" x="360" y="426" text-anchor="middle" font-size="13" font-weight="500">A thin control layer between your manifest and Apple&#x27;s runtime — single host, no cluster.</text>

</svg>
