<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" role="img" aria-labelledby="title desc">
  <title id="title">Where Hostwright sits in local-dev stack</title>
  <desc id="desc">Hostwright as a control layer between your services and Apple&#x27;s container runtime on macOS.</desc>
  
    <style><![CDATA[
      .label { font-family: Helvetica, Arial, sans-serif; fill: #202327; font-size: 18px; font-weight: 600; }
      .small { font-family: Helvetica, Arial, sans-serif; fill: #646973; font-size: 13px; font-weight: 400; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #202327; font-size: 15px; }
      .tiny { font-family: Helvetica, Arial, sans-serif; fill: #646973; font-size: 11px; }
      .box { fill: #f3f1ec; stroke: #e4e1da; stroke-width: 1.5; }
      .box-ink { fill: #f3f1ec; stroke: #202327; stroke-width: 1.5; }
      .planned { stroke: #5a5f67; stroke-dasharray: 8 6; }
      .arrow { stroke: #202327; stroke-width: 1.7; fill: none; marker-end: url(#arrowInk); }
      .arrowAccent { stroke: #1f3a5f; stroke-width: 2; fill: none; marker-end: url(#arrowAccent); }
      .hair { stroke: #e4e1da; stroke-width: 1.5; }
    ]]></style>
    
  <defs>
    <marker id="arrowInk" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#202327"/>
    </marker>
    <marker id="arrowAccent" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f3a5f"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="720" height="420" fill="#faf9f6"/>
<rect x="90" y="70" width="540" height="58" rx="8" class="box-ink" />
<text x="360.0" y="99.0" class="label" text-anchor="middle" dominant-baseline="middle">Your services / code</text>
<path d="M 360.0 134 L 360.0 142" class="arrow"/>
<rect x="90" y="150" width="540" height="72" rx="8" fill="#1f3a5f" stroke="#1f3a5f" stroke-width="1.5"/>
<text x="360.0" y="178" class="label" text-anchor="middle" dominant-baseline="middle" style="fill:#faf9f6">Hostwright</text>
<text x="360.0" y="202" class="small" text-anchor="middle" dominant-baseline="middle" style="fill:#faf9f6">(declared state + control)</text>
<path d="M 360.0 228 L 360.0 222" class="arrowAccent"/>
<rect x="90" y="245" width="540" height="58" rx="8" class="box-ink" />
<text x="360.0" y="274.0" class="label" text-anchor="middle" dominant-baseline="middle">Apple container runtime</text>
<path d="M 360.0 309 L 360.0 317" class="arrow"/>
<rect x="90" y="325" width="540" height="58" rx="8" class="box-ink" />
<text x="360.0" y="354.0" class="label" text-anchor="middle" dominant-baseline="middle">macOS on Apple silicon</text>
<text x="360" y="405" class="small" text-anchor="middle">A thin control layer between your manifest and Apple&#x27;s runtime — single host, no cluster.</text>
</svg>
